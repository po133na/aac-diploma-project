version: '3.8'

services:
  # База данных PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: aac_postgres
    environment:
      POSTGRES_USER: aac_user
      POSTGRES_PASSWORD: aac_password
      POSTGRES_DB: aac_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aac_user -d aac_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build: .
    container_name: aac_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://aac_user:aac_password@db:5432/aac_db
      - HUGGINGFACE_API_TOKEN=${HUGGINGFACE_API_TOKEN}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: